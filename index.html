<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Calculadora profesional IGTF 3% + IVA 16%, retención de IVA y tasa BCV - Grupo Punteral"
    />
    <title>Grupo Punteral - Calculadora IGTF + IVA</title>
    <link rel="icon" href="logo.png" type="image/png" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />

    <style>
      :root {
        --azul: #0f3a68;
        --naranja: #d78d25;
      }
      .glass {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
      }
      .dark .glass {
        background: rgba(15, 23, 42, 0.95);
      }
      input,
      textarea,
      select {
        color: #1f2937;
      }
      .dark input,
      .dark textarea,
      .dark select {
        color: #e5e7eb;
        background-color: #1e2937;
      }
      .text-naranja {
        color: var(--naranja);
      }
      .badge-orden {
        background-color: #0f3a68;
        color: white;
        font-weight: bold;
        cursor: default;
      }
      .text-gray-dark {
        color: #1e293b;
      }
      .dark .text-gray-dark {
        color: #e5e7eb;
      }
      @supports (backdrop-filter: blur(20px)) {
        .glass {
          backdrop-filter: blur(20px);
        }
      }
      @supports not (backdrop-filter: blur(20px)) {
        .glass {
          background: rgba(255, 255, 255, 0.98);
        }
        .dark .glass {
          background: rgba(15, 23, 42, 0.98);
        }
      }
      .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: nowrap;
      }
      @media (max-width: 640px) {
        .header-container {
          flex-wrap: wrap;
          gap: 1rem;
        }
        .btn-tema {
          margin-left: auto;
        }
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-slate-50 to-slate-100 dark:from-slate-950 dark:to-slate-900 min-h-screen flex flex-col"
  >
    <div id="app"></div>
    <script type="module" src="./main.js?v=877e867-fix"></script>
  </body>
</html>
